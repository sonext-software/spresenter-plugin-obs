<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OBS Studio</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #16181d;
        color: #e6e6e6;
        font-size: 13px;
        padding: 16px;
      }
      h1 { font-size: 15px; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
      p.sub { color: #8a8f98; margin: 0 0 16px; font-size: 12px; }
      label { display: block; margin-bottom: 4px; color: #b8bcc4; }
      .field { margin-bottom: 12px; }
      input[type="text"], input[type="number"], input[type="password"] {
        width: 100%;
        background: #0d0f13;
        border: 1px solid #2a2e37;
        border-radius: 6px;
        color: #fff;
        padding: 8px 10px;
        outline: none;
      }
      input:focus { border-color: #5b8def; }
      .row { display: flex; gap: 10px; }
      .row .field { flex: 1; }
      .check { display: flex; align-items: center; gap: 8px; }
      .check input { accent-color: #5b8def; }
      .actions { display: flex; gap: 8px; margin-top: 8px; }
      button {
        border: 0;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
        color: #fff;
      }
      button.primary { background: #3a6df0; }
      button.primary:hover { background: #4d7cf5; }
      button.ghost { background: #23262e; }
      button.ghost:hover { background: #2c3039; }
      .status {
        display: flex; align-items: center; gap: 8px;
        margin: 4px 0 16px; padding: 8px 12px;
        background: #0d0f13; border: 1px solid #2a2e37; border-radius: 6px;
      }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: #6b7280; }
      .dot.connected { background: #22c55e; }
      .dot.connecting { background: #eab308; }
      .dot.error { background: #ef4444; }
      .status-detail { color: #8a8f98; font-size: 11px; margin-left: auto; }
    </style>
  </head>
  <body>
    <h1>🎥 OBS Studio</h1>
    <p class="sub">Conecte ao servidor obs-websocket (Ferramentas → WebSocket Server) e use os nós "OBS Studio" no editor de automação.</p>

    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="status-label">—</span>
      <span class="status-detail" id="status-detail"></span>
    </div>

    <div class="row">
      <div class="field" style="flex: 2">
        <label for="host">Host</label>
        <input type="text" id="host" value="127.0.0.1" />
      </div>
      <div class="field">
        <label for="port">Porta</label>
        <input type="number" id="port" value="4455" />
      </div>
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="(sem senha)" autocomplete="off" />
    </div>

    <div class="field check">
      <input type="checkbox" id="autoConnect" checked />
      <label for="autoConnect" style="margin: 0">Conectar automaticamente ao iniciar</label>
    </div>

    <div class="actions">
      <button class="primary" id="save">Salvar e conectar</button>
      <button class="ghost" id="connect">Conectar</button>
      <button class="ghost" id="disconnect">Desconectar</button>
    </div>

    <script>
      var MARKER = '__spresenter';
      function post(data) {
        var env = {};
        env[MARKER] = true;
        env.data = data;
        window.parent.postMessage(env, '*');
      }

      var $ = function (id) { return document.getElementById(id); };
      var passwordDirty = false;
      $('password').addEventListener('input', function () { passwordDirty = true; });

      function applySettings(s) {
        if (!s) return;
        $('host').value = s.host != null ? s.host : '127.0.0.1';
        $('port').value = s.port != null ? s.port : 4455;
        $('autoConnect').checked = s.autoConnect !== false;
        // We don't receive the plaintext password; show a placeholder if one is set.
        $('password').placeholder = s.hasPassword ? '•••••••• (definida)' : '(sem senha)';
        if (!passwordDirty) $('password').value = '';
      }

      var LABELS = {
        disconnected: 'Desconectado',
        connecting: 'Conectando…',
        connected: 'Conectado',
        error: 'Erro',
      };
      function applyStatus(status, detail) {
        var dot = $('dot');
        dot.className = 'dot' + (status ? ' ' + status : '');
        $('status-label').textContent = LABELS[status] || status || '—';
        $('status-detail').textContent = detail || '';
      }

      window.addEventListener('message', function (ev) {
        var env = ev.data;
        if (!env || env[MARKER] !== true) return;
        var msg = env.data;
        if (!msg || typeof msg !== 'object') return;
        if (msg.type === 'settings') {
          applySettings(msg.settings);
          applyStatus(msg.status, msg.detail);
        } else if (msg.type === 'status') {
          applyStatus(msg.status, msg.detail);
        }
      });

      function collect() {
        return {
          host: $('host').value.trim(),
          port: Number($('port').value) || 4455,
          password: passwordDirty ? $('password').value : undefined,
          autoConnect: $('autoConnect').checked,
        };
      }

      $('save').addEventListener('click', function () {
        post({ type: 'save-settings', settings: collect() });
        passwordDirty = false;
      });
      $('connect').addEventListener('click', function () { post({ type: 'connect' }); });
      $('disconnect').addEventListener('click', function () { post({ type: 'disconnect' }); });

      // Ask for the current state on load.
      post({ type: 'get-settings' });
    </script>
  </body>
</html>
